<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Impact Kit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="view">
    <div class="header-row">
      <span class="title">Impact Kit</span>
      <button id="categoryCog" class="header-cog" title="Manage shake presets"></button>
    </div>

    <div id="updateBanner" class="update-banner hidden">
      <span id="updateBannerText">Update available</span>
      <button id="btnUpdate" class="update-btn">Install Update</button>
    </div>

    <div class="category-grid" id="categoryGrid">
      <div class="category-cell">
        <button class="category-btn" data-category="out">Out</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="in">In</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="mid">Mid</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="buildup">BU</button>
      </div>
    </div>

    <button id="btnApply">Apply</button>
    <div id="statusLine" class="status">
      <span class="status-dot"></span>
      <span id="statusText"></span>
    </div>
  </div>

  <div id="presetModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">Shake Presets</span>
        <button id="modalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-rows">
        <div class="modal-row">
          <span class="modal-row-label">Out</span>
          <span class="modal-row-file" id="presetFile-out">Default</span>
          <button class="modal-row-btn" data-category="out">Change</button>
        </div>
        <div class="modal-row">
          <span class="modal-row-label">In</span>
          <span class="modal-row-file" id="presetFile-in">Default</span>
          <button class="modal-row-btn" data-category="in">Change</button>
        </div>
        <div class="modal-row">
          <span class="modal-row-label">Mid</span>
          <span class="modal-row-file" id="presetFile-mid">Default</span>
          <button class="modal-row-btn" data-category="mid">Change</button>
        </div>
        <div class="modal-row">
          <span class="modal-row-label">Build-Up</span>
          <span class="modal-row-file" id="presetFile-buildup">Default</span>
          <button class="modal-row-btn" data-category="buildup">Change</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/CSInterface.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
