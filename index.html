<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Impact Kit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="view">
    <div class="header-row">
      <span class="title">Impact Kit</span>
      <button id="categoryCog" class="header-cog" title="Import custom shake preset"></button>
    </div>

    <div id="updateBanner" class="update-banner hidden">
      <span id="updateBannerText">Update available</span>
      <button id="btnUpdate" class="update-btn">Install Update</button>
    </div>

    <div class="category-grid" id="categoryGrid">
      <div class="category-cell">
        <button class="category-btn" data-category="out">Out</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="in">In</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="mid">Mid</button>
      </div>
      <div class="category-cell">
        <button class="category-btn" data-category="buildup">BU</button>
      </div>
    </div>

    <button id="btnApply">Apply</button>
    <div id="statusLine" class="status">
      <span class="status-dot"></span>
      <span id="statusText"></span>
    </div>
  </div>

  <script src="js/CSInterface.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
